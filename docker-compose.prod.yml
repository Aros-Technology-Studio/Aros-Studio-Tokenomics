# AST production stack — no demo institutions
# cp .env.production.example .env.production  # fill secrets
# docker compose -f docker-compose.prod.yml --env-file .env.production up --build -d
services:
  core:
    build: .
    image: ghcr.io/aros-technology-studio/ast-core:${AST_IMAGE_TAG:-1.1.0}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      AST_JOURNAL_ENGINE: ${AST_JOURNAL_ENGINE:-file}
      AST_JOURNAL_DIR: /data/journal
      AST_REQUIRE_CRYPTO: "1"
      AST_KEY_PROVIDER: ${AST_KEY_PROVIDER:-file}
      KILL_SWITCH: ${KILL_SWITCH:-false}
      PORT: "3000"
      AST_REQUIRE_INSTITUTION_AUTH: "1"
      AST_INSTITUTION_TOKEN: ${AST_INSTITUTION_TOKEN:?set AST_INSTITUTION_TOKEN}
      AST_INSTITUTION_SECRETS_JSON: ${AST_INSTITUTION_SECRETS_JSON:-}
    ports:
      - "${CORE_PUBLISH_PORT:-3000}:3000"
    volumes:
      - ast_journal_prod:/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  portal-edge:
    build: ./portal/backend
    image: ghcr.io/aros-technology-studio/ast-portal-edge:${AST_IMAGE_TAG:-1.1.0}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORTAL_PORT: "3100"
      CORE_API_URL: http://core:3000
      PORTAL_CORE_HANDOFF: "true"
      AST_ALLOW_DEMO: "0"
      AST_INSTITUTION_TOKEN: ${AST_INSTITUTION_TOKEN}
      AST_INSTITUTION_SECRETS_JSON: ${AST_INSTITUTION_SECRETS_JSON:?set AST_INSTITUTION_SECRETS_JSON}
    ports:
      - "${PORTAL_EDGE_PUBLISH_PORT:-3100}:3100"
    depends_on:
      core:
        condition: service_healthy

  portal-ui:
    build:
      context: ./portal/frontend
      args:
        NEXT_PUBLIC_PORTAL_API_URL: ${NEXT_PUBLIC_PORTAL_API_URL:-}
    image: ghcr.io/aros-technology-studio/ast-portal-ui:${AST_IMAGE_TAG:-1.1.0}
    restart: unless-stopped
    environment:
      PORT: "3200"
      HOSTNAME: 0.0.0.0
      NODE_ENV: production
    ports:
      - "${PORTAL_UI_PUBLISH_PORT:-3200}:3200"
    depends_on:
      - portal-edge

volumes:
  ast_journal_prod:
