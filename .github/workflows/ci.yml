name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: First journal record (ephemeral)
        run: npm run journal:first -- --dir /tmp/ast-journal-ci
      - name: Tokenization demo (layers 01–10 path)
        run: npm run demo:tokenize -- --dir /tmp/ast-tokenize-ci
