name: AST CI

# Merged pipeline: build → tests → env layout → canon guards → journal → RocksDB demo.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test-guards-demo:
    name: build · test · canon · journal · tokenize
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: ENV layout (Docker, rules, contracts, rust, layers — no portal gate)
        run: npm run check:env

      - name: Canon / domain / layout / layer-docs guards
        run: npm run check:canon

      - name: Journal first record (file engine)
        run: npm run journal:first -- --dir /tmp/ast-journal-ci --engine file

      - name: Tokenization demo (RocksDB + ed25519 + L1/L2/L3)
        run: npm run demo:tokenize -- --dir /tmp/ast-tokenize-ci --engine rocksdb
