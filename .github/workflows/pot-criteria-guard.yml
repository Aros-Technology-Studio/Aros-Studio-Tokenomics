name: PoT criteria guard

# Ensures CANON retains PoT Criteria P1–P4 and all-pass verdict rules.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  pot-criteria:
    name: P1–P4 in canon
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run pot-criteria-guard
        run: bash .github/scripts/pot-criteria-guard.sh
