name: No bypass PoT / NodeChain

# Blocks changes that attempt to skip PoT or NodeChain on significant operations.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  no-bypass:
    name: PoT + NodeChain required
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run no-bypass-pot-nodechain
        run: bash .github/scripts/no-bypass-pot-nodechain.sh
