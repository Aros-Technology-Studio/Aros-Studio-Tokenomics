name: Token protocol guard

# Protects AST Token Protocol: NodeChain + PoT are the canonical layer.
# ERC-20 / ERC-3643 / ERC-1400 (and future ERCs) are Representation Adapters only.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  token-protocol:
    name: AST Token Protocol
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run token-protocol-guard
        run: bash .github/scripts/token-protocol-guard.sh
