name: Layout scaffold guard

# P4 must-haves: portal / nodechain / pot-engine scaffolds + protective workflows.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  layout-scaffold:
    name: layout + workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run layout-scaffold-guard
        run: bash .github/scripts/layout-scaffold-guard.sh
