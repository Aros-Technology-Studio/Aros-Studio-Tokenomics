name: Layout scaffold guard

# Layers architecture: docs/layers + core src + protective workflows.
# Portal is not required by this gate.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  layout-scaffold:
    name: layout + workflows (layers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run layout-scaffold-guard
        run: bash .github/scripts/layout-scaffold-guard.sh
