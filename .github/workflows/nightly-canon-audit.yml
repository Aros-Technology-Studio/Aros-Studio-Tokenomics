name: Nightly canon audit

# A daily (and on-demand) audit of the repository against the AST canon.
# Hard-fails on firewall / vocabulary breaches (same gate as pull requests),
# then reports forbidden-concept keywords for a human to confirm each is an
# invariant-derived negation (a concept with no object) and not a live mechanic.

on:
  schedule:
    - cron: '17 3 * * *'   # daily 03:17 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: full canon scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Canon gate (hard — firewall + vocabulary)
        run: bash .github/scripts/canon-gate.sh

      - name: Forbidden-concept report (soft)
        run: |
          CONCEPTS='buyback|liquidity pool|price[ _-]?floor|price[ _-]?stabilit|velocity throttle|staking|security deposit|governance vote|maxSupply|pre-mine|vesting|\bBTC\b|\bETH\b'
          hits="$(grep -RIniE "$CONCEPTS" . \
            --exclude-dir=.git --exclude-dir=.github --exclude-dir=node_modules \
            --exclude=README.md --exclude=PROJECT_STATUS.md --exclude=MIGRATION_REVIEW.md \
            2>/dev/null || true)"
          if [ -n "$hits" ]; then
            echo "::warning::Forbidden-concept keywords present — confirm each is an invariant-derived negation (a concept with no object under I6), not a live mechanic:"
            echo "$hits"
          else
            echo "No forbidden-concept keywords found."
          fi
