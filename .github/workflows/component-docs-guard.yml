name: Component docs guard

# Layer docs under docs/layers/* (historical workflow name; not portal packs).

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  component-docs:
    name: docs/layers packs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run component-docs-guard
        run: bash .github/scripts/component-docs-guard.sh
