name: Component docs guard

# Every required component pack must have PURPOSE / MODEL / CONTRACT / ACCEPTANCE.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  component-docs:
    name: packs present
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run component-docs-guard
        run: bash .github/scripts/component-docs-guard.sh
