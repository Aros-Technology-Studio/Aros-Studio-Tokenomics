name: AST philosophy guard

# Main defender of the AST Core Canon (CANON.md).
# Verifies required canon anchors and blocks hard-forbidden live mechanics.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  philosophy-guard:
    name: canon principles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ast-philosophy-guard
        run: bash .github/scripts/ast-philosophy-guard.sh
