name: AST CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js 20.x
      uses: actions/setup-node@v3
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Build NestJS
      run: npm run build

    - name: Check Model-1 Prohibitions (P1-P8)
      run: npm run check:prohibitions

    - name: Run Tests
      run: npm test

    - name: Compile Contracts
      run: |
        cd smart_contracts
        npm install
        npx hardhat compile
