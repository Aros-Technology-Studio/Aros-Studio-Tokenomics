name: AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    # Завершаем работу, если PR преобразован в черновик
    if: github.event.pull_request.draft == false
    env:
      # Даём gh CLI токен из встроенного GITHUB_TOKEN
      GH_TOKEN: ${{ github.token }}
      # Прокидываем секреты в env (чтобы их можно было использовать в if)
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GROK_API_KEY:   ${{ secrets.GROK_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Make PR diff (max 120 KB)
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          git diff --unified=0 origin/${{ github.base_ref }}...HEAD | head -c 120000 > pr.diff

      - name: Comment via OpenAI
        if: ${{ env.OPENAI_API_KEY != '' }}
        run: |
          echo "Preparing diff for OpenAI..."
          DIFF_CONTENT=$(cat pr.diff)
          # Безопасно формируем JSON-тело с помощью jq и --arg
          BODY=$(jq -n --arg diff_text "$DIFF_CONTENT" \
            '{
              "model": "gpt-4o-mini",
              "messages": [
                {
                  "role": "user",
                  "content": ("Review this diff:\n```diff\n" + $diff_text + "\n```")
                }
              ],
              "temperature": 0.2
            }')
          curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            | jq -r '.choices[0].message.content // empty' > openai.md
          if [ -s openai.md ] && [ "$(cat openai.md)" != "null" ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body-file openai.md
          fi

      - name: Comment via Grok
        if: ${{ env.GROK_API_KEY != '' }}
        run: |
          echo "Preparing diff for Grok..."
          DIFF_CONTENT=$(cat pr.diff)
          # Безопасно формируем JSON-тело с помощью jq и --arg
          BODY=$(jq -n --arg diff_text "$DIFF_CONTENT" \
            '{
              "model": "grok-2-latest",
              "messages": [
                {
                  "role": "user",
                  "content": ("Review this diff:\n```diff\n" + $diff_text + "\n```")
                }
              ],
              "temperature": 0.2
            }')
          curl -s https://api.x.ai/v1/chat/completions \
            -H "Authorization: Bearer $GROK_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            | jq -r '.choices[0].message.content // empty' > grok.md
          if [ -s grok.md ] && [ "$(cat grok.md)" != "null" ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body-file grok.md
          fi

      - name: Comment via Gemini
        if: ${{ env.GEMINI_API_KEY != '' }}
        run: |
          echo "Preparing diff for Gemini..."
          DIFF_CONTENT=$(cat pr.diff)
          # Безопасно формируем JSON-тело с помощью jq и --arg
          BODY=$(jq -n --arg diff_text "$DIFF_CONTENT" \
            '{
              "contents": [
                {
                  "parts": [
                    {
                      "text": ("Review this diff:\n```diff\n" + $diff_text + "\n```")
                    }
                  ]
                }
              ]
            }')
          curl -s "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            | jq -r '.candidates[0].content.parts[0].text // empty' > gemini.md
          if [ -s gemini.md ] && [ "$(cat gemini.md)" != "null" ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body-file gemini.md
          fi

