  <rect x="760" y="375" width="520" height="40" fill="#D4D4D8"/><text x="775" y="400" font-family="system-ui,sans-serif" font-size="12" fill="#52525B">item 2</text>
  <rect x="760" y="425" width="520" height="40" fill="#D4D4D8"/><text x="775" y="450" font-family="system-ui,sans-serif" font-size="12" fill="#52525B">item 3</text>
