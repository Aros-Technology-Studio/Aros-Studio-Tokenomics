<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" fill="none">
  <rect width="1440" height="900" fill="#F4F4F5"/>
  <!-- HEADER -->
  <rect x="0" y="0" width="1440" height="72" fill="#E4E4E7" stroke="#A1A1AA" stroke-width="1"/>
  <rect x="48" y="20" width="200" height="32" fill="#D4D4D8" stroke="#71717A"/>
  <text x="56" y="40" font-family="system-ui,sans-serif" font-size="12" fill="#52525B">LOGO</text>
  <rect x="900" y="22" width="56" height="28" fill="#D4D4D8" stroke="#71717A"/>
  <text x="908" y="40" font-family="system-ui,sans-serif" font-size="11" fill="#52525B">nav</text>
  <rect x="968" y="22" width="56" height="28" fill="#D4D4D8" stroke="#71717A"/>
  <text x="976" y="40" font-family="system-ui,sans-serif" font-size="11" fill="#52525B">nav</text>
  <rect x="1036" y="22" width="64" height="28" fill="#D4D4D8" stroke="#71717A"/>
  <text x="1044" y="40" font-family="system-ui,sans-serif" font-size="11" fill="#52525B">nav</text>
  <rect x="1220" y="18" width="160" height="36" fill="#A1A1AA" stroke="#52525B"/>
  <text x="1240" y="40" font-family="system-ui,sans-serif" font-size="12" fill="#FAFAFA">CTA login</text>

  <!-- HERO -->
  <rect x="120" y="100" width="1200" height="260" fill="#E4E4E7" stroke="#71717A" stroke-width="2"/>
