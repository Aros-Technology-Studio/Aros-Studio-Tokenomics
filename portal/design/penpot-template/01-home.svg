  <rect x="140" y="150" width="180" height="16" fill="#D4D4D8"/>
  <text x="145" y="162" font-family="system-ui,sans-serif" font-size="10" fill="#52525B">eyebrow</text>
  <rect x="140" y="180" width="900" height="40" fill="#D4D4D8"/>
  <text x="145" y="205" font-family="system-ui,sans-serif" font-size="14" fill="#27272A">H1 title</text>
  <rect x="140" y="235" width="700" height="48" fill="#D4D4D8"/>
  <text x="145" y="255" font-family="system-ui,sans-serif" font-size="11" fill="#52525B">lead text (2–3 lines)</text>
  <rect x="140" y="300" width="160" height="40" fill="#A1A1AA"/>
  <text x="160" y="325" font-family="system-ui,sans-serif" font-size="12" fill="#FAFAFA">BTN primary</text>
  <rect x="316" y="300" width="160" height="40" fill="#D4D4D8" stroke="#71717A"/>
  <text x="336" y="325" font-family="system-ui,sans-serif" font-size="12" fill="#3F3F46">BTN secondary</text>
  <rect x="492" y="300" width="160" height="40" fill="#D4D4D8" stroke="#71717A"/>
  <text x="512" y="325" font-family="system-ui,sans-serif" font-size="12" fill="#3F3F46">BTN tertiary</text>

  <!-- KPI ROW -->
  <text x="120" y="400" font-family="system-ui,sans-serif" font-size="14" fill="#3F3F46">BLOCK: KPI × 4</text>
  <rect x="120" y="415" width="280" height="120" fill="#E4E4E7" stroke="#71717A"/>
  <text x="140" y="450" font-family="system-ui,sans-serif" font-size="12" fill="#52525B">KPI 1 label</text>
  <text x="140" y="480" font-family="system-ui,sans-serif" font-size="16" fill="#27272A">KPI 1 value</text>
  <text x="140" y="510" font-family="system-ui,sans-serif" font-size="11" fill="#71717A">hint</text>
  <rect x="420" y="415" width="280" height="120" fill="#E4E4E7" stroke="#71717A"/>
  <text x="440" y="450" font-family="system-ui,sans-serif" font-size="12" fill="#52525B">KPI 2 label</text>
  <text x="440" y="480" font-family="system-ui,sans-serif" font-size="16" fill="#27272A">KPI 2 value</text>
  <rect x="720" y="415" width="280" height="120" fill="#E4E4E7" stroke="#71717A"/>
  <text x="740" y="450" font-family="system-ui,sans-serif" font-size="12" fill="#52525B">KPI 3 label</text>
  <text x="740" y="480" font-family="system-ui,sans-serif" font-size="16" fill="#27272A">KPI 3 value</text>
  <rect x="1020" y="415" width="280" height="120" fill="#E4E4E7" stroke="#71717A"/>
  <text x="1040" y="450" font-family="system-ui,sans-serif" font-size="12" fill="#52525B">KPI 4 label</text>
  <text x="1040" y="480" font-family="system-ui,sans-serif" font-size="16" fill="#27272A">KPI 4 value</text>

  <!-- TWO DOORS -->
  <text x="120" y="575" font-family="system-ui,sans-serif" font-size="14" fill="#3F3F46">BLOCK: TWO DOORS</text>
  <rect x="120" y="590" width="580" height="180" fill="#E4E4E7" stroke="#71717A" stroke-width="2"/>
  <text x="140" y="625" font-family="system-ui,sans-serif" font-size="16" fill="#27272A">Door A — Public</text>
  <rect x="140" y="645" width="400" height="40" fill="#D4D4D8"/>
  <text x="145" y="670" font-family="system-ui,sans-serif" font-size="11" fill="#52525B">short description</text>
  <rect x="140" y="710" width="120" height="36" fill="#D4D4D8" stroke="#71717A"/>
  <text x="165" y="732" font-family="system-ui,sans-serif" font-size="12" fill="#3F3F46">link</text>
  <rect x="276" y="710" width="120" height="36" fill="#A1A1AA"/>
  <text x="300" y="732" font-family="system-ui,sans-serif" font-size="12" fill="#FAFAFA">link</text>

  <rect x="720" y="590" width="580" height="180" fill="#E4E4E7" stroke="#71717A" stroke-width="2"/>
  <text x="740" y="625" font-family="system-ui,sans-serif" font-size="16" fill="#27272A">Door B — Institution</text>
  <rect x="740" y="645" width="400" height="40" fill="#D4D4D8"/>
  <text x="745" y="670" font-family="system-ui,sans-serif" font-size="11" fill="#52525B">short description</text>
  <rect x="740" y="710" width="140" height="36" fill="#A1A1AA"/>
  <text x="770" y="732" font-family="system-ui,sans-serif" font-size="12" fill="#FAFAFA">CTA login</text>

  <!-- FOOTER -->
  <rect x="0" y="840" width="1440" height="60" fill="#E4E4E7" stroke="#A1A1AA"/>
  <text x="48" y="875" font-family="system-ui,sans-serif" font-size="12" fill="#52525B">FOOTER left</text>
  <text x="1200" y="875" font-family="system-ui,sans-serif" font-size="12" fill="#52525B">FOOTER right</text>
</svg>
