openapi: 3.1.0
info:
  title: AST Institutional Portal Edge API
  version: 1.0.0
  description: |
    Edge API for institutional clients.
    Login → document package hash → primary tokenization submit → status.
    Aligns processId and idempotency with Core Orchestrator and Core Canon.
    Does **not** mint; Core remains source of truth after hand-off.
servers:
  - url: http://localhost:3100
    description: Local portal backend
tags:
  - name: health
  - name: auth
  - name: documents
  - name: processes
paths:
  /v1/health:
    get:
      tags: [health]
      operationId: getHealth
      summary: Liveness
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /v1/auth/institutions:
    get:
      tags: [auth]
      operationId: listInstitutions
      summary: Public list of allowlisted institutions (ids + display names only)
      responses:
        '200':
          description: Institutions
          content:
            application/json:
              schema:
                type: object
                required: [institutions]
                properties:
                  institutions:
                    type: array
                    items:
                      type: object
                      required: [institutionId, displayName]
                      properties:
                        institutionId:
                          type: string
                        displayName:
                          type: string

  /v1/auth/login:
    post:
      tags: [auth]
      operationId: login
      summary: Institution login (allowlisted token)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [institutionId, token]
              properties:
                institutionId:
                  type: string
                  example: DEMO
                token:
                  type: string
                  example: demo-institution-token
      responses:
        '200':
          description: Session issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Error'

  /v1/auth/me:
    get:
      tags: [auth]
      operationId: me
      summary: Current session
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Session info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionInfo'
        '401':
          $ref: '#/components/responses/Error'

  /v1/auth/logout:
    post:
      tags: [auth]
      operationId: logout
      summary: Invalidate session
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /v1/documents/hash:
    post:
      tags: [documents]
      operationId: hashDocuments
      summary: SHA-256 document package at the edge
      description: |
        Does not store documents as SoT. Returns 64-hex hash for process submit.
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HashDocumentsRequest'
      responses:
        '200':
          description: Hash computed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HashDocumentsResponse'
        '401':
          $ref: '#/components/responses/Error'
        '422':
          $ref: '#/components/responses/Error'

  /v1/processes:
    get:
      tags: [processes]
      operationId: listProcesses
      summary: List edge-tracked processes for the session institution
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Process list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessList'
        '401':
          $ref: '#/components/responses/Error'
    post:
      tags: [processes]
      operationId: createProcess
      summary: Submit primary tokenization process (edge)
      description: |
        Requires session, institutional valuation (decimal string), document package hash,
        and qualified signature flag. Idempotency-Key mandatory.
        Session institution overrides spoofed X-Institution-Id.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/SessionId'
        - $ref: '#/components/parameters/InstitutionIdOptional'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProcessRequest'
      responses:
        '202':
          description: Accepted for Core hand-off
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessAccepted'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        '422':
          $ref: '#/components/responses/Error'

  /v1/processes/{processId}:
    get:
      tags: [processes]
      operationId: getProcess
      summary: Get process status (merge edge + Core when available)
      parameters:
        - $ref: '#/components/parameters/ProcessId'
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Process status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessStatus'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'

  /v1/processes/{processId}/documents:
    post:
      tags: [processes]
      operationId: attachDocuments
      summary: Attach / replace document package metadata on edge
      parameters:
        - $ref: '#/components/parameters/ProcessId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttachDocumentsRequest'
      responses:
        '200':
          description: Documents recorded on edge
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessStatus'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '422':
          $ref: '#/components/responses/Error'

components:
  parameters:
    ProcessId:
      name: processId
      in: path
      required: true
      schema:
        type: string
        pattern: '^AST-[A-Za-z0-9]+-\d{8}-[A-Za-z0-9]+$'
        example: AST-DEMO-20260719-a1b2c3d4e5f6
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 128
      description: Mandatory; same key + payload must not open two processes
    SessionId:
      name: X-Session-Id
      in: header
      required: true
      schema:
        type: string
        minLength: 16
      description: Session from POST /v1/auth/login
    InstitutionIdOptional:
      name: X-Institution-Id
      in: header
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 32
      description: Optional; must match session institution if present

  schemas:
    HealthResponse:
      type: object
      required: [status, service]
      properties:
        status:
          type: string
          enum: [ok]
        service:
          type: string
          example: portal-backend
        coreHandOff:
          type: string
          enum: [live, disabled]
        coreApiUrl:
          type: string

    LoginResponse:
      type: object
      required: [sessionId, institutionId, displayName, expiresAt]
      properties:
        sessionId:
          type: string
        institutionId:
          type: string
        displayName:
          type: string
        expiresAt:
          type: string
          format: date-time

    SessionInfo:
      type: object
      required: [institutionId, displayName, expiresAt]
      properties:
        institutionId:
          type: string
        displayName:
          type: string
        expiresAt:
          type: string
          format: date-time

    HashDocumentsRequest:
      type: object
      properties:
        rawPackage:
          type: string
          description: Pre-concatenated package string
        parts:
          type: array
          items:
            type: object
            required: [name, content]
            properties:
              name:
                type: string
              content:
                type: string
              encoding:
                type: string
                enum: [utf8, base64]
                default: utf8

    HashDocumentsResponse:
      type: object
      required: [documentPackageHash, institutionId]
      properties:
        documentPackageHash:
          type: string
          pattern: '^[a-fA-F0-9]{64}$'
        institutionId:
          type: string
        byteLength:
          type: integer
        partCount:
          type: integer

    CreateProcessRequest:
      type: object
      required:
        - processType
        - valuation
        - holderId
        - hasQualifiedSignature
        - documentPackageHash
      properties:
        processId:
          type: string
          description: Optional client processId; must match AST-{INST}-{YYYYMMDD}-{suffix}
          pattern: '^AST-[A-Za-z0-9]+-\d{8}-[A-Za-z0-9]+$'
        processType:
          type: string
          enum: [primary_tokenization, revaluation, ownership_transfer]
        valuation:
          type: string
          description: Institutional valuation as decimal string (max 9 fraction digits)
          pattern: '^-?\d+(\.\d{1,9})?$'
          example: '1000000.000000000'
        holderId:
          type: string
        assetId:
          type: string
        hasQualifiedSignature:
          type: boolean
          description: Must be true — qualified institutional signature present
        documentPackageHash:
          type: string
          description: SHA-256 hex of document package
          pattern: '^[a-fA-F0-9]{64}$'
        note:
          type: string
          maxLength: 512

    AttachDocumentsRequest:
      type: object
      required:
        - documentPackageHash
        - hasQualifiedSignature
      properties:
        documentPackageHash:
          type: string
          pattern: '^[a-fA-F0-9]{64}$'
        hasQualifiedSignature:
          type: boolean
        documentCount:
          type: integer
          minimum: 1

    ProcessAccepted:
      type: object
      required:
        - processId
        - idempotencyKey
        - status
        - institutionId
        - valuation
        - hasQualifiedSignature
      properties:
        processId:
          type: string
        idempotencyKey:
          type: string
        status:
          type: string
          enum: [accepted, awaiting_core, submitted_to_core, duplicate]
        institutionId:
          type: string
        valuation:
          type: string
        hasQualifiedSignature:
          type: boolean
        documentPackageHash:
          type: string
        message:
          type: string
        core:
          type: object
          additionalProperties: true
        coreError:
          type: object
          additionalProperties: true

    ProcessList:
      type: object
      required: [institutionId, count, processes]
      properties:
        institutionId:
          type: string
        count:
          type: integer
        processes:
          type: array
          items:
            type: object
            properties:
              processId:
                type: string
              status:
                type: string
              processType:
                type: string
              valuation:
                type: string
              holderId:
                type: string
              createdAt:
                type: string
                format: date-time
              updatedAt:
                type: string
                format: date-time

    ProcessStatus:
      type: object
      required: [processId]
      properties:
        processId:
          type: string
        status:
          type: string
        source:
          type: string
          enum: [edge, core]
        processType:
          type: string
        institutionId:
          type: string
        valuation:
          type: string
        hasQualifiedSignature:
          type: boolean
        documentPackageHash:
          type: string
        idempotencyKey:
          type: string
        updatedAt:
          type: string
          format: date-time
        edge:
          type: object
          additionalProperties: true

    ErrorBody:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - VALIDATION_ERROR
            - MISSING_VALUATION
            - MISSING_QUALIFIED_SIGNATURE
            - MISSING_DOCUMENTS
            - INVALID_PROCESS_ID
            - IDEMPOTENCY_REQUIRED
            - IDEMPOTENCY_PAYLOAD_MISMATCH
            - NOT_FOUND
            - FORBIDDEN
            - AUTH_REQUIRED
            - AUTH_INVALID
            - AUTH_NOT_ALLOWLISTED
            - AUTH_SESSION
            - EMPTY_PACKAGE
        message:
          type: string
        details:
          type: array
          items:
            type: string

  responses:
    Error:
      description: Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
