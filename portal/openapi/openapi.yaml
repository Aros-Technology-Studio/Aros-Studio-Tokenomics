openapi: 3.1.0
info:
  title: AST Institutional Portal API
  version: 1.0.0
  description: |
    Edge API for the Institutional Portal. Aligns with AST Core Canon v1.0.
    All economic cycles enter core Orchestrator; Portal does not implement PoT, emission, or ledger.
    AST never appraises assets — institutional valuation is provided by the participant.

servers:
  - url: http://localhost:3001/v1
    description: Local development
  - url: https://api.ast.example/v1
    description: Production (example)

security:
  - BearerAuth: []
  - MutualTLS: []

paths:
  /tokenization/start:
    post:
      summary: Start primary tokenization process
      operationId: startTokenization
      tags: [Tokenization]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartTokenizationRequest'
      responses:
        '201':
          description: Process created (StartProcess)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Idempotency key conflict

  /documents/upload:
    post:
      summary: Upload document with mandatory qualified e-signature
      operationId: uploadDocument
      tags: [Documents]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, processId, signature]
              properties:
                file:
                  type: string
                  format: binary
                processId:
                  $ref: '#/components/schemas/ProcessId'
                signature:
                  type: string
                  description: Base64-encoded qualified electronic signature
                signatureAlgorithm:
                  type: string
                  description: Algorithm identifier for the signature
      responses:
        '200':
          description: Document accepted for validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentUploadResponse'
        '400':
          description: Invalid signature or payload
        '422':
          description: Document rejected by validation rules

  /processes/{processId}:
    get:
      summary: Get process status (own processes only)
      operationId: getProcess
      tags: [Processes]
      parameters:
        - $ref: '#/components/parameters/ProcessIdParam'
      responses:
        '200':
          description: Current process state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessResponse'
        '404':
          description: Not found or not owned by caller

  /assets:
    get:
      summary: List tokenized assets for current institution
      operationId: listAssets
      tags: [Assets]
      responses:
        '200':
          description: Asset list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AssetSummary'

  /assets/{claimId}:
    get:
      summary: Asset detail (own only)
      operationId: getAsset
      tags: [Assets]
      parameters:
        - name: claimId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Asset detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetDetail'
        '404':
          description: Not found or not owned

  /health:
    get:
      summary: Liveness
      operationId: health
      security: []
      tags: [Health]
      responses:
        '200':
          description: OK

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Short-lived browser session after mTLS + institutional certificate verification
    MutualTLS:
      type: mutualTLS
      description: Institutional certificate (primary identity)

  parameters:
    ProcessIdParam:
      name: processId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ProcessId'

  schemas:
    ProcessId:
      type: string
      description: |
        Orchestrator process id.
        Pattern: AST-{INST}-{YYYYMMDD}-<UUIDv7>
      example: AST-DEMO-20260716-0192f3c4-8b2a-7d6e-9f01-23456789abcd
      pattern: '^AST-[A-Z0-9]+-[0-9]{8}-.+$'

    StartTokenizationRequest:
      type: object
      required: [assetType, institutionalValuation, currency, idempotencyKey]
      properties:
        assetType:
          type: string
          enum: [real_estate, bond, investment_package, other]
        institutionalValuation:
          type: string
          description: Confirmed institutional valuation as decimal string (AST does not compute this)
          example: "1000000.00"
        currency:
          type: string
          example: GEL
        idempotencyKey:
          type: string
          description: Mandatory dedupe key for StartProcess
        metadata:
          type: object
          additionalProperties: true

    ProcessResponse:
      type: object
      required: [processId, status, createdAt]
      properties:
        processId:
          $ref: '#/components/schemas/ProcessId'
        status:
          type: string
          enum:
            - created
            - documents_pending
            - validating
            - pot_pending
            - settling
            - completed
            - failed
            - expired
        createdAt:
          type: string
          format: date-time
        currentStep:
          type: string
          description: Orchestrator pipeline step name when known
        claimId:
          type: string
          nullable: true

    DocumentUploadResponse:
      type: object
      properties:
        documentId:
          type: string
        processId:
          $ref: '#/components/schemas/ProcessId'
        status:
          type: string
          enum: [accepted, rejected]
        rejectionReason:
          type: string
          nullable: true

    AssetSummary:
      type: object
      properties:
        claimId:
          type: string
        assetType:
          type: string
        currentValuation:
          type: string
        tokenSupply:
          type: string
        status:
          type: string

    AssetDetail:
      allOf:
        - $ref: '#/components/schemas/AssetSummary'
        - type: object
          properties:
            processHistory:
              type: array
              items:
                type: object
                additionalProperties: true
            ownership:
              type: array
              items:
                type: object
                additionalProperties: true

  responses:
    BadRequest:
      description: Invalid request
    Unauthorized:
      description: Authentication required
    Forbidden:
      description: Insufficient permissions
